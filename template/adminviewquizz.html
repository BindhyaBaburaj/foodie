{% extends 'adminbase.html' %}
{% block content %}
<style type="text/css">
	#log{
		background-color: rgba(0, 150, 220, 0.5);
		margin: 10px 150px;
		padding: 50px;
		color: white;
		width: 1000px;
		float: left;
	}
	td,th{
		padding: 20px;
	}
	#tbl{
		width: 900px;
	}
	a{
		color: #ebd231;
	}
	    table {
  border-collapse: collapse;
  border: none;
}

th{
    background-color: rgba(0, 100, 180, 0.7);
    color: #ebd231;
}
/*tr:nth-child(odd) {background-color: silver;}*/
</style>
<div style="margin: 100px;">
    <form method="POST">
        {% csrf_token %}
        <h3 style="margin-bottom: 20px;text-align:center">Quiz Questions</h3>
        <table border="0" style="margin:auto;"> 
      
            <tr>
                <th>SL/NO.</th>
                <th>QUESTION</th>
                <th>OPTION 1</th>
                <th>OPTION 2</th>
                <th>OPTION 3</th>         
                <th>ANSWER</th>         
                <th></th>              
            </tr>
            {% for d in data %}
            <tr>
                
                <td>{{forloop.counter}}</td>
                <td>{{d.questions}}</td>
                <td>{{d.o1}}</td>
                <td>{{d.o2}}</td>
                <td>{{d.o3}}</td>
                <td>{{d.ans}}</td>
                <td>
                    <a href="/adminDeleteQuiz?id={{d.id}}" class="btn btn-danger">Delete</a>
                </td>

               
            </tr>
            {% endfor %}
        </table>
        </form>
        </div>
{% endblock %}
