{% extends 'customerbase.html' %}
{% block content %}
<style type="text/css">
	#log{
		background-color: rgba(0, 150, 220, 0.5);
		margin: 10px 150px;
		padding: 50px;
		color: white;
		width: 1000px;
		float: left;
	}
	td,th{
		padding: 5px;
	}
	#tbl{
		width: 900px;
	}
	a{
		color: #ebd231;
	}
	    table {
  border-collapse: collapse;
  border: none;
}

th{
    background-color: rgba(0, 100, 180, 0.7);
    color: #ebd231;
}
/*tr:nth-child(odd) {background-color: silver;}*/
</style>
<div style="margin: 100px;">
    <form method="POST">
        {% csrf_token %}
        <h3 style="margin: 20px;">Menu</h3>
        <table border="0" style="margin:50px;"> 
      
            <!-- <tr>
                <th>Category</th>
                <th>Type </th>
                <th>Name</th>
                <th>Rate</th>
                <th colspan="3">Image</th>
            </tr> -->
            {% if d %}
            <tr>
                
                <td rowspan="7"><img src="../static/media/{{d.img}}" style="border-radius: 50%;" height="250px" width="250px"></td>
                <tr><td><h3>{{d.name}}</h3></td></tr>
                <tr><td> Category: {{d.category}}</td></tr>
                <tr><td> {{d.desc}}</td></tr>
                <tr><td>
                Type: 
                {% if d.type == "Non Veg" %}
                <img src="../static/images/non.png" height="20px" width="20px">
                {% else %}
                <img src="../static/images/veg.png" height="20px" width="20px">
                {% endif %}
                {{d.type}}</td></tr>
                <tr><td>Rate: Rs.{{d.rate}}<br></td></tr>
                <tr><td>Quantity:<input type="number" class="form-control" name="qty" style="width: 70px; margin: -30px 0px 0px 80px;" value="1"></td></tr>
                <tr><td><input type="submit" class="btn btn-dark"  value="Order now"></td></tr>
               
                 <tr><td><a href="/customerviewdish?id={{d.restaurants.id}}" > Continue ordering</a></td></tr>
         
            {% endif %}
        </table>
        </form>
        </div>
        <script>
            var msg="{{msg}}";
            if(msg!="")
                alert(msg);        
        </script>
{% endblock %}
