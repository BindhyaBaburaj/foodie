        <style type="text/css">
            #log{
                background-color: rgba(0, 150, 220, 0.5);
                margin: 10px 150px;
                padding: 50px;

            a{
                color: #ebd231;
            }
                table {
          border-collapse: collapse;

        }

<div style="margin: 100px;">
    <form method="POST">
        {% csrf_token %}
        <h3 style="margin: 20px;">Menu</h3>
        <table border="0" style="margin:50px;"> 
      
            <!-- <tr>
                <th>Category</th>
                <th>Type </th>
                <th>Name</th>
                <th>Rate</th>
                <th colspan="3">Image</th>
            </tr> -->
            {% for d in data %}
            <tr>
                
                <td><img src="../static/media/{{d.img}}" style="border-radius: 50%;" height="150px" width="150px"></td>
                <td><h3>{{d.name}}</h3>
                Category: {{d.category}}
                <br>
                Type: 
                {% if d.type == "Non Veg" %}
                <img src="../static/images/non.png" height="20px" width="20px">
                {% else %}
                <img src="../static/images/veg.png" height="20px" width="20px">
                {% endif %}
                {{d.type}}<br>
                Rate: Rs.{{d.rate}}</td>
              
               <td><a href="/customerviewdetails?id={{d.id}}">View details</a><br><br>
               
              
            </tr>
            
            {% endfor %}
        </table>
        </form>
