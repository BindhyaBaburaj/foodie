{% extends 'adminbase.html' %} {% block content %}
<style type="text/css">
	#log {
		background-color: rgba(0, 150, 220, 0.5);
		margin: 10px 150px;
		padding: 50px;
		color: white;
		width: 1000px;
		float: left;
	}
	td,
	th {
		padding: 10px;
	}
	#tbl {
		width: 900px;
	}
	a {
		color: #ebd231;
	}
	table {
		border-collapse: collapse;
		border: none;
	}

	th {
		background-color: rgba(0, 100, 180, 0.7);
		color: #ebd231;
	}
	/*tr:nth-child(odd) {background-color: silver;}*/
</style>
<div style="margin: 100px">
	<form method="POST">
		{% csrf_token %}
		<h3 style="margin-bottom: 20px; text-align:center">Booking Items</h3>

		<table border="0" style="margin: auto">
			<tr>
				<th>CUISINE</th>
				<th>RATE</th>
				<th>QUANTITY</th>
				<th>AMOUNT</th>
			</tr>
			{% for d in data %}
			<tr>
				<td>{{d.cuisine.name}}</td>
				<td>{{d.cuisine.rate}}</td>
				<td>{{d.quantity}}</td>
				<td>{{d.amount}}</td>
			</tr>
			{% endfor %}
		</table>
	</form>
</div>
{% endblock %}
