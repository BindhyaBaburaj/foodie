{% extends 'customerbase.html' %} {% block content %}
<style type="text/css">
	#log {
		background-color: rgba(0, 150, 220, 0.5);
		margin: 10px 150px;
		padding: 50px;
		color: white;
		width: 1000px;
		float: left;
	}
	td,
	th {
		padding: 10px;
	}
	#tbl {
		width: 900px;
	}
	a {
		color: #ebd231;
	}
	table {
		border-collapse: collapse;
		border: none;
	}

	th {
		background-color: rgba(0, 100, 180, 0.7);
		color: #ebd231;
	}
	/*tr:nth-child(odd) {background-color: silver;}*/
</style>
<div style="margin: 100px">
	<form method="POST">
		{% csrf_token %}
		<h3 style="margin-bottom: 20px;text-align:center">ORDERS</h3>
		{% if data %}
		<table border="0" style="margin: auto; width: 80%">
			<tr>
				<th>ORDER NO</th>
				<th>DATE</th>
				<th>STATUS</th>
				<th></th>
				<th></th>
			</tr>
			{% for d in data %}
			
			<tr>
				<td>{{d.id}}</td>
				<td>{{d.date}}</td>
				<td>{{d.status}}</td>
				<td><a href="/customerorderdetails?id={{d.id}}">View details</a></td>
				{% if d.status == 'Ordered' %}
				<td><a href="/customerCancelorder?id={{d.id}}">Cancel</a></td>
				{% endif %}
			</tr>
			{% endfor %}
		</table>
		{% else %}
		<h4>No orders yet</h4>
		{% endif %}
	</form>
</div>
{% endblock %}
